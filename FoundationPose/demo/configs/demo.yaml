camera:
  width: 640
  height: 480
  fps: 30
  target_width: 640
  target_height: 480
  depth_scale_override: null
  # Timeouts for pipeline.wait_for_frames (sync path and grab thread). USB/load spikes may need 10s+.
  async_first_frame_timeout_ms: 8000
  async_frame_timeout_ms: 10000
  # Main loop read timeout to keep GUI responsive when camera temporarily stalls.
  main_loop_frame_timeout_ms: 1000
  # Auto-restart RealSense pipeline after this many consecutive read timeouts.
  recover_after_consecutive_timeouts: 3
  camera_restart_cooldown_s: 0.3
  wait_for_frames_retries: 3
  grab_failures_before_abort: 200

sync:
  tolerance_ms: 33.0

mesh:
  # file: "../../assets/meshes/white_diamond/white_diamond.obj"
  file: "../../assets/meshes/bottle/bottle.obj"

fastsam:
  model_path: "../../third_party/FastSAM/weights/FastSAM-s.pt"
  device: "auto"
  imgsz: 1024
  conf: 0.75
  iou: 0.9
  retina_masks: false
  # Release FastSAM model after the first successful click-init registration.
  release_fastsam_after_init: true

tracker:
  est_refine_iter: 2
  track_refine_iter: 1
  rot_grid_min_views: 16
  rot_grid_inplane_step: 90
  score_max_candidates: 96
  render_bs_cap: 32
  score_render_bs_cap: 12
  score_forward_bs_cap: 24
  max_translation_jump_m: 0.35
  max_rotation_jump_deg: 70
  # max_translation_jump_m: 0.20
  # max_rotation_jump_deg: 45.0
  min_mask_pixels: 64

# Multi-metric drift gate (replaces single combined translation jump when enabled).
drift:
  enabled: true
  max_xy_jump_m: 0.35
  max_z_jump_m: 0.28
  max_rot_deg: 70
  max_rpy_rate_deg_s: 480
  max_z_depth_residual_m: 0.10
  min_depth_valid_ratio: 0.18
  bad_frames_for_reinit: 5
  suspect_ratio: 0.55
  z_median_blend: 0.42
  rotation_slerp: 0.5
  z_median_blend_depth_recovery: 0.72

# FoundationPose++-style: Cutie 2D bbox + optional KalmanFilter6D on pose_last before track_one.
fpp:
  cutie_enabled: true
  kalman_6d_enabled: true
  # When kf_continue: keep roll/pitch from last stable pose, yaw from KF prediction.
  lock_roll_pitch_on_kf_continue: false
  # On pose jump:
  # - reuse_mask: existing behavior, may re-register with cached init mask
  # - kf_continue: keep outputting pose via KF-assisted continuation, skip mask re-register
  pose_recovery_mode: "kf_continue"
  # Safety guard for kf_continue: max consecutive continuation frames after pose jump.
  kf_continue_max_frames: 30
  kf_measurement_noise_scale: 1.0
  draw_cutie_bbox: true
  # If true, clear click mask when tracker reports pose jump / reinit_required.
  clear_mask_on_pose_reinit: true

cutie:
  seg_threshold: 0.1
  erosion_size: 5
  max_internal_size: 480

performance:
  # Set true to decouple capture from inference (latest frame only). Tune async_*_timeout_ms under camera if needed.
  async_camera: false
  fast_depth_filter: false

visualization:
  axis_scale_m: 0.1
  axis_thickness: 3
  show_cutie_mask_overlay: true
  cutie_mask_alpha: 0.35

offline:
  replay_dir: ""
  record_dir: ""

debug:
  level: 0
  dir: "../../debug/demo"
  hz_log_interval_s: 2.0
